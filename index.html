<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会員証</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<script>
  const LIFF_ID = "2009733800-Hkn1IS4j";
  const GAS_BASE = "https://script.google.com/macros/s/AKfycbw0ONBB0_Af6Gym2RApBEz0JirfSdgAKYBZncIXZCLFYoMDiCnR0S-tmhtzZNIvaRo3Lg/exec";

  async function main() {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    location.replace(
      GAS_BASE + "?page=card_by_line&line_id=" + encodeURIComponent(profile.userId)
    );
  }

  main();
</script>

</body>
</html>
